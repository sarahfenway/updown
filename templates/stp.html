{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}Up Down London</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="{% static "favicon.ico" %}" type="image/x-icon" />
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="60x60" href="{% static "apple-touch-icon-60x60.png" %}"/>
    <link rel="apple-touch-icon" sizes="76x76" href="{% static "apple-touch-icon-76x76.png" %}"/>
    <link rel="apple-touch-icon" sizes="120x120" href="{% static "apple-touch-icon-120x120.png" %}"/>
    <link rel="apple-touch-icon" sizes="152x152" href="{% static "apple-touch-icon-152x152.png" %}"/>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap-theme.min.css"
          integrity="sha384-rHyoN1iRsVXV4nD0JutlnGaslCJuC7uwjduW9SVrLvRYooPp2bWYgmgJQIXwl/Sp" crossorigin="anonymous">

    <!-- Our stuff -->
    <link href="//netdna.bootstrapcdn.com/font-awesome/3.2.1/css/font-awesome.css" rel="stylesheet">
    {% if debug %}
        <link rel="stylesheet" type="text/css" href="{% static "updown.min.css" %}updown.min.css" %}">
    {% else %}
        <link rel="stylesheet" type="text/css" href="{% static "updown.css" %}">
    {% endif %}
    <link href='https://fonts.googleapis.com/css?family=Montserrat:400,700' rel='stylesheet' type='text/css'>
</head>
<body>
<div class="container">
    <div class="row header-box">
        <div class="col-md-12">
            <h1>
                {% if yes_or_no %}Yes{% else %}No{% endif %}
            </h1>
        </div>
    </div>
    <hr>
    <div class="row header-box">
        <div class="col-md-6 col-md-offset-3">
            <h3>
                <a href="https://updownlondon.com/" style="color: #333">Visit <i class="icon-arrow-up green"></i><i class="icon-arrow-down red"></i>
                    UP DOWN LONDON for full lift status</a></h3>
            </h3>
        </div>
    </div>


</div>
</body>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery.js"></script>
<script src="{% static 'jquery.fittext.js' %}"></script>
<script>!function (d, s, id) {
    var js, fjs = d.getElementsByTagName(s)[0], p = /^http:/.test(d.location) ? 'http' : 'https';
    if (!d.getElementById(id)) {
        js = d.createElement(s);
        js.id = id;
        js.src = p + '://platform.twitter.com/widgets.js';
        fjs.parentNode.insertBefore(js, fjs);
    }
}(document, 'script', 'twitter-wjs');
</script>
<script>
    (function (i, s, o, g, r, a, m) {
        i['GoogleAnalyticsObject'] = r;
        i[r] = i[r] || function () {
            (i[r].q = i[r].q || []).push(arguments)
        }, i[r].l = 1 * new Date();
        a = s.createElement(o),
            m = s.getElementsByTagName(o)[0];
        a.async = 1;
        a.src = g;
        m.parentNode.insertBefore(a, m)
    })(window, document, 'script', '//www.google-analytics.com/analytics.js', 'ga');

    ga('create', 'UA-44056681-1', 'updownlondon.com');
    ga('send', 'pageview');
</script>
<script>
    jQuery("h1").fitText(1.25, {minFontSize: '30px'});
</script>
</html>
