name: Fly Deploy

# Deploy to Fly.io on every push to master. Concurrency guard cancels an
# in-flight deploy if a newer commit lands, so you never have two deploys
# racing for the volume.
on:
  push:
    branches:
      - master

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
